<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metabolite Plotter</title>
    
    <script src="./scripts/app.js"></script>
    <script src="./scripts/ester-data.js"></script>
    <script src="./scripts/calc-curve.js"></script>
    <script src="./scripts/bateman.js"></script>
    <script src="./scripts/chartSettings.js"></script>
    <script src="./scripts/studyPresets.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@2.8.2/dist/alpine.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@^3"></script>
    <script src="https://cdn.jsdelivr.net/npm/moment@^2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-moment@^1"></script>

    <style>
        :root {
            --bg: #f4f4f9;
            --panel: #ffffff;
            --text: #333;
            --muted: #666;
            --border: #ddd;
        }

        .dark {
            --bg: #121212;
            --panel: #1e1e1e;
            --text: #e6e6e6;
            --muted: #aaa;
            --border: #474a57;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
        }

        .container {
            margin: 0 auto;
            padding: 15px;
            max-width: 1000px;
            background-color: var(--panel);
            min-height: 100vh; /* Ensures background covers full screen */
            display: flex;
            flex-direction: column;
        }

        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 15px;
        }

        .title {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 600;
        }

        /* Chart constraints */
        #myChart {
            width: 100% !important;
            height: 40vh !important; /* Forces chart to 40% of viewport height */
            min-height: 300px; /* Safety for very small screens */
            background: var(--panel);
            border-radius: 8px;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 16px;
            margin: 15px 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--muted);
        }

        /* Responsive Grid */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            padding-bottom: 30px;
        }

        @media (min-width: 650px) {
            .form-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (min-width: 900px) {
            .form-grid { grid-template-columns: repeat(3, 1fr); }
        }

        .field {
            display: grid;
            grid-template-columns: 110px 1fr;
            align-items: center;
            gap: 10px;
        }

        label {
            font-size: 12px;
            font-weight: 600;
        }

        input, select {
            width: 100%;
            padding: 8px 10px;
            font-size: 14px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--panel);
            color: var(--text);
            outline: none;
        }

        input:focus, select:focus {
            border-color: #4f46e5;
        }

        /* Theme Toggle */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: #4f46e5; }
        input:checked + .slider:before { transform: translateX(20px); }

        .source-box {
            grid-column: 1 / -1;
            padding: 8px;
            background: rgba(79, 70, 229, 0.1);
            border-radius: 4px;
            font-size: 12px;
        }

        a { color: #4f46e5; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container" x-data="metaboliteApp()" x-init="initializeChart(); updateChart();" :class="theme">

    <div class="header-row">
        <h2 class="title" x-text="settings.esterData[settings.esterKey].name"></h2>
        <div class="theme-toggle">
            <label class="switch">
                <input type="checkbox" :checked="theme === 'dark'"
                       @change="theme = $event.target.checked ? 'dark' : 'light'; localStorage.setItem('theme', theme); updateChart();">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <canvas id="myChart"></canvas>

    <h2>Simulation Settings</h2>
    <div class="form-grid" x-effect="updateChart()" x-on:change="updateChart()">
        
        <div class="field">
            <label>Ester:</label>
            <select x-model="settings.esterKey">
                <template x-for="[key, ester] in Object.entries(settings.esterData)" :key="key">
                    <option :value="key" :selected="settings.esterKey === key" x-text="ester.name"></option>
                </template>
            </select>
        </div>

        <div class="field">
            <label>Preset:</label>
            <select x-model="settings.selectedPreset">
                <template x-for="[key, preset] in Object.entries(studyPresets.presets)" :key="key">
                    <option :disabled="key === 'custom'" :value="key" x-text="preset.label"></option>
                </template>
            </select>
        </div>

        <div class="field">
            <label>Dose (mg):</label>
            <input type="number" x-model.number="settings.dose" min="0" step="5">
        </div>

        <div class="field">
            <label>Start Date:</label>
            <input type="date" x-model="settings.startDateField">
        </div>

        <div class="field">
            <label>Interval (days):</label>
            <input type="number" x-model.number="settings.doseFrequency" min="1">
        </div>

        <div class="field">
            <label>Duration (wks):</label>
            <input type="number" x-model.number="settings.durationWeeks" min="1">
        </div>

        <div class="field" x-show="settings.esterData[settings.esterKey].active_form === 'test'">
            <label>Age Group:</label>
            <select x-model="settings.age">
                <option value="young">Young (18-36)</option>
                <option value="old">Old (36+)</option>
            </select>
        </div>

        <div class="field">
            <label>Units:</label>
            <select x-model="settings.nmolNgDl">
                <option value="nmol">nmol/L</option>
                <option value="ngdl">ng/dL</option>
            </select>
        </div>

        <div class="field" x-show="settings.esterData[settings.esterKey].active_form !== 'e2'">
            <label>Model Logic:</label>
            <select x-model="settings.bateman">
                <option value="false">3-Compartment</option>
                <option value="true">Bateman</option>
            </select>
        </div>

        <div class="field">
            <label>Resolution:</label>
            <input type="number" x-model.number="settings.drawPointTime" min=".005" step=".0125">
        </div>

        <template x-if="studyPresets.presets[settings.selectedPreset].source">
            <div class="source-box">
                Reference: <a :href="studyPresets.presets[settings.selectedPreset].source" x-text="studyPresets.presets[settings.selectedPreset].label" target="_blank"></a>
            </div>
        </template>
    </div>
</div>

</body>
</html>
