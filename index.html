<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Hormone and Metabolite Plotter</title>

    <!-- Load Alpine.js -->
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@2.8.2/dist/alpine.min.js" defer></script>
    <script src="./scripts/app.js"></script>
    <script src="./scripts/ester-data.js"></script>
    <script src="./scripts/calc-curve.js"></script>
    <script src="./scripts/bateman.js"></script>
    <script src="./scripts/chartSettings.js"></script>
    <script src="./scripts/studyPresets.js"></script>
    <!-- Load Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@^3"></script>
    <script src="https://cdn.jsdelivr.net/npm/moment@^2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-moment@^1"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@1"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
    </style>
</head>
<body>
<div class="container-fluid" x-data="metaboliteApp()" x-init="initializeChart(); updateChart();" :class="theme">
    <h2 class="title text-center">
        <span>Hormone and Metabolite Plotter</span>
    </h2>
    <!-------------------------------------- Graphing System Col ------------------------------------------->
    <div class="row" x-effect="updateChart()" x-on:change="updateChart()">
        <div class="col-12 col-md-8 col-lg-8 col-xl-9" style="height: 65vh">
            <div class="border rounded h-100 d-flex flex-column">

                <div class="chart-container flex-grow-1">
                    <canvas id="myChart"></canvas>
                </div>

            </div>
            <div x-show="typeof(studyPresets.presets[settings.selectedPreset].source) !== 'undefined'" class="border rounded pb-3 p-2">
                <div >
                    <span><a x-text="studyPresets.presets[settings.selectedPreset].label"
                             :href="studyPresets.presets[settings.selectedPreset].source"></a></span>
                </div>
            </div>
        </div>
        <!-------------------------------------- Formulation Control Col --------------------------------------->
        <div class="col-12 col-md-6 col-lg-4 col-xl-3">

            <!-- Ester -->
            <div class="mb-3">
                <div class="input-group">
                    <span class="input-group-text">Ester</span>
                    <select class="form-select" x-model="settings.esterKey">
                        <option disabled value="" selected>
                            Load Ester
                        </option>
                        <template x-for="[key, ester] in Object.entries(settings.esterData)" :key="key">
                            <option :value="ester.ester_shortcode" x-text="ester.name" :key="key"></option>
                        </template>
                    </select>
                </div>
            </div>

            <!-- Study preset -->
            <div class="mb-3">
                <div class="input-group">
                    <span class="input-group-text">Preset</span>
                    <select class="form-select"
                            x-model="settings.selectedPreset"
                            @change="updateChart()">
                        <template x-for="[key, preset] in Object.entries(studyPresets.presets)" :key="key">
                            <option :disabled="key === 'custom'"
                                    :value="key"
                                    x-text="preset.label"></option>
                        </template>
                    </select>
                </div>
            </div>

            <!-- Dose -->
            <div class="mb-3">
                <div class="input-group">
                    <span class="input-group-text">Dose</span>
                    <input class="form-control"
                           type="number"
                           x-model.number="settings.dose"
                           min="0"
                           step="5">
                    <span class="input-group-text">mg</span>
                </div>
            </div>

            <!-- Start Date -->
            <div class="mb-3">
                <div class="input-group">
                    <span class="input-group-text">Start</span>
                    <input class="form-control"
                           type="date"
                           x-model="settings.startDateField">
                </div>
            </div>

            <!-- Interval -->
            <div class="mb-3">
                <div class="input-group">
                    <span class="input-group-text">Interval</span>
                    <input class="form-control"
                           type="number"
                           x-model.number="settings.doseFrequency"
                           min="1">
                    <span class="input-group-text">days</span>
                </div>
            </div>

            <!-- Duration -->
            <div class="mb-3">
                <div class="input-group">
                    <span class="input-group-text">Duration</span>
                    <input class="form-control"
                           type="number"
                           x-model.number="settings.durationWeeks"
                           min="1">
                    <span class="input-group-text">weeks</span>
                </div>
            </div>

            <!-- Age -->
            <div class="mb-3" x-show="settings.esterData[settings.esterKey].active_form === 'test'">
                <div class="input-group">
                    <span class="input-group-text">Age</span>
                    <select class="form-select" x-model="settings.age">
                        <option value="young">young (18–36)</option>
                        <option value="old">old (36+)</option>
                    </select>
                </div>
            </div>

            <!-- Units -->
            <div class="mb-3">
                <div class="input-group">
                    <span class="input-group-text">Units</span>
                    <select class="form-select" x-model="settings.nmolNgDl">
                        <option value="nmol">nmol/L</option>
                        <option value="ngdl">ng/dL</option>
                    </select>
                </div>
            </div>

            <!-- Plotter -->
            <div class="mb-3" x-show="settings.esterData[settings.esterKey].active_form !== 'e2'">
                <div class="input-group">
                    <span class="input-group-text">Model</span>
                    <select class="form-select" x-model="settings.bateman">
                        <option value="false">3-compartment</option>
                        <option value="true">Bateman</option>
                    </select>
                </div>
            </div>

            <!-- Draw points -->
            <div class="mb-3">
                <div class="input-group">
                    <span class="input-group-text">Resolution</span>
                    <input class="form-control"
                           type="number"
                           x-model.number="settings.drawPointTime"
                           min=".005"
                           step=".0125">
                    <span class="input-group-text">/day</span>
                </div>
            </div>

            <!-- Mode -->
            <template x-if="settings.doses > 1">
            <div class="mb-3" >
                <div class="input-group">
                    <span class="input-group-text">Mode</span>
                    <select class="form-select" x-model="settings.steadyStateMode">
                        <option value="false">Transient</option>
                        <option value="true">Steady-state</option>
                    </select>
                </div>
            </div>
            </template>

        </div>

</html>
